name: nextjs
description: Next.js application
image: node:24-alpine
port: 3000
healthcheck_path: /api/health
category: web-frameworks
deploy_mode: standalone
runtime_version: node:24-alpine
dockerfile: |
  FROM node:24-alpine
  WORKDIR /app
  COPY package*.json ./
  RUN npm ci
  COPY . .
  RUN npm run build
  EXPOSE 3000
  CMD ["npm", "start"]

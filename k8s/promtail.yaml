apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: harbr-system
spec:
  selector:
    matchLabels: {app: promtail}
  template:
    metadata:
      labels: {app: promtail}
    spec:
      containers:
      - name: promtail
        image: grafana/promtail:2.9.8
        args: ["-config.file=/etc/promtail/config.yaml"]
        volumeMounts:
        - name: varlog
          mountPath: /var/log
        - name: varlibdocker
          mountPath: /var/lib/docker/containers
          readOnly: true
        - name: config
          mountPath: /etc/promtail
      volumes:
      - name: varlog
        hostPath: {path: /var/log}
      - name: varlibdocker
        hostPath: {path: /var/lib/docker/containers}
      - name: config
        configMap:
          name: promtail-config

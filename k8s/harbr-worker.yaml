apiVersion: apps/v1
kind: Deployment
metadata:
  name: harbr-worker
  namespace: harbr-system
spec:
  replicas: 1
  selector:
    matchLabels: {app: harbr-worker}
  template:
    metadata:
      labels: {app: harbr-worker}
    spec:
      serviceAccountName: harbr-api
      containers:
      - name: worker
        image: 100.64.0.1:30500/harbr/api:latest
        command: ["node", "dist/worker/worker.main.js"]
        envFrom:
        - secretRef:
            name: harbr-api-secrets
        resources:
          requests: {cpu: 200m, memory: 256Mi}
          limits: {cpu: "2.0", memory: 1Gi}

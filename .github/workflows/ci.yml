name: CI

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]
  release:
    types: [created]

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '20'

jobs:
  # ─── Go daemon ──────────────────────────────────────────────────────────────
  daemon-build:
    name: 'Daemon — build & test'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daemon
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: daemon/go.sum

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build daemon binary
        run: go build -v -o /dev/null ./cmd/harbrd/...

      - name: Build CLI binary
        run: go build -v -o /dev/null ./cmd/harbr/...

      - name: Run tests
        run: go test -v -race -timeout 120s -coverprofile=coverage.out ./...
        continue-on-error: true

  # ─── API ────────────────────────────────────────────────────────────────────
  api-build:
    name: 'API — typecheck & test'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint "src/**/*.ts" --max-warnings=0
        continue-on-error: true

      - name: Unit tests
        run: npm test -- --passWithNoTests --forceExit
        env:
          NODE_ENV: test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ci-test-secret
          REGISTRY_IP: localhost

  # ─── UI ─────────────────────────────────────────────────────────────────────
  ui-build:
    name: 'UI — typecheck & build'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_BASE: http://localhost:3001

  # ─── Release binaries ───────────────────────────────────────────────────────
  release:
    name: 'Release binaries'
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [daemon-build, api-build, ui-build]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: daemon/go.sum

      - name: Build release binaries
        working-directory: daemon
        run: |
          VERSION=${{ github.ref_name }}
          LDFLAGS="-X main.Version=${VERSION}"
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/harbr-linux-amd64   ./cmd/harbr/...
          GOOS=linux GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/harbr-linux-arm64   ./cmd/harbr/...
          GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/harbrd-linux-amd64  ./cmd/harbrd/...
          GOOS=linux GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/harbrd-linux-arm64  ./cmd/harbrd/...

      - name: Generate checksums
        working-directory: daemon/dist
        run: |
          sha256sum harbr-linux-amd64  > harbr-linux-amd64.sha256
          sha256sum harbr-linux-arm64  > harbr-linux-arm64.sha256
          sha256sum harbrd-linux-amd64 > harbrd-linux-amd64.sha256
          sha256sum harbrd-linux-arm64 > harbrd-linux-arm64.sha256

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: daemon/dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
